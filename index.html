<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PHÚC AN BADMINTON</title>
    <style>
        :root { --bg: #f4f7f6; --text: #2c3e50; --primary: #27ae60; --card: #ffffff; }
        .dark { --bg: #1a1a1a; --text: #ecf0f1; --card: #2d2d2d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; transition: 0.3s; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .slot { padding: 10px; border: 1px solid var(--primary); border-radius: 8px; cursor: pointer; text-align: center; }
        .slot.busy { background: #e74c3c; color: white; border: none; cursor: not-allowed; }
        .slot.free { background: var(--primary); color: white; }
        button#themeBtn { background: none; border: 1px solid var(--text); color: var(--text); padding: 5px 10px; cursor: pointer; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <button id="themeBtn" onclick="toggleTheme()">Chuyển Sáng/Tối</button>
    <h1>PHÚC AN BADMINTON</h1>
    
    <input type="text" id="ten" placeholder="Tên khách hàng" style="width:100%; padding:10px; margin-bottom:5px;">
    <input type="tel" id="sdt" placeholder="Số điện thoại" style="width:100%; padding:10px;">
    
    <select id="chonSan" onchange="renderSlots()" style="width:100%; padding:10px; margin:10px 0;">
        <option>Sân số 1</option><option>Sân số 2</option>
    </select>
    <input type="date" id="ngay" onchange="renderSlots()" style="width:100%; padding:10px;">

    <h3>Chọn giờ sân trống:</h3>
    <div id="gridSlots" class="grid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://phuc-an-badminton-1ab18-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const khungGio = ["05:00-06:00", "06:00-07:00", "07:00-08:00", "08:00-09:00", "17:00-18:00", "18:00-19:00", "19:00-20:00", "20:00-21:00"];
    let daDat = [];

    function toggleTheme() { document.body.classList.toggle('dark'); }

    db.ref('lichDatCauLong').on('value', snap => {
        daDat = [];
        snap.forEach(c => daDat.push({key: c.key, ...c.val()}));
        renderSlots();
    });

    function renderSlots() {
        const san = document.getElementById('chonSan').value;
        const ngay = document.getElementById('ngay').value;
        const grid = document.getElementById('gridSlots');
        grid.innerHTML = '';
        
        khungGio.forEach(g => {
            const isBusy = daDat.find(l => l.san == san && l.ngay == ngay && l.khung == g);
            const div = document.createElement('div');
            div.className = `slot ${isBusy ? 'busy' : 'free'}`;
            div.innerHTML = isBusy ? "Đã đặt" : g;
            if(!isBusy) div.onclick = () => datSan(g);
            grid.appendChild(div);
        });
    }

    function datSan(khung) {
        const ten = document.getElementById('ten').value;
        const sdt = document.getElementById('sdt').value;
        if(!ten || !sdt) return alert("Nhập tên và SĐT!");
        db.ref('lichDatCauLong').push({
            ten, sdt, khung,
            san: document.getElementById('chonSan').value,
            ngay: document.getElementById('ngay').value
        });
    }

    document.getElementById('ngay').valueAsDate = new Date();
</script>
</body>
</html>
