<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÚC AN BADMINTON</title>
    <style>
        :root { --bg: #f4f7f6; --text: #2c3e50; --card: #ffffff; --primary: #27ae60; }
        .dark { --bg: #1a1a1a; --text: #ecf0f1; --card: #2d2d2d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 10px; }
        .hotline { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-weight: bold; border: 1px solid #ffeeba; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="document.body.classList.toggle('dark')" style="padding:5px; margin-bottom:10px;">Sáng/Tối</button>
    <h1>PHÚC AN BADMINTON</h1>
    <div class="hotline">☎ Hủy/Đổi sân gọi: 0395.936.865</div>

    <div>
        <h3>THÔNG TIN KHÁCH</h3>
        <input type="text" id="hoTen" placeholder="Họ và Tên">
        <input type="tel" id="sdt" placeholder="Số điện thoại">
        <button onclick="luuThongTin()">Lưu Thông Tin</button>
    </div>

    <hr style="margin: 20px 0;">

    <label>Chọn Sân</label>
    <select id="san" onchange="loadLich()"><option>Sân số 1</option><option>Sân số 2</option></select>
    
    <label>Ngày đặt</label>
    <input type="date" id="ngay" onchange="loadLich()">
    
    <label>Khung giờ (Khách tự nhập)</label>
    <input type="text" id="thoiGian" placeholder="Ví dụ: 17:15 - 18:45 hoặc 05h-06h30...">
    
    <button onclick="datSan()" style="background:#27ae60;">XÁC NHẬN ĐẶT SÂN</button>

    <h3>Lịch đã đặt:</h3>
    <div id="danhSach"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAs-wZ-Fm49pTHeZ15T8bZc9S9oFm6XvM4",
        databaseURL: "https://phuc-an-badminton-1ab18-default-rtdb.firebaseio.com",
        projectId: "phuc-an-badminton-1ab18"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function luuThongTin() {
        localStorage.setItem('user', JSON.stringify({hoTen: document.getElementById('hoTen').value, sdt: document.getElementById('sdt').value}));
        alert("Thông tin đã được lưu!");
    }

    function datSan() {
        const user = JSON.parse(localStorage.getItem('user'));
        const thoiGian = document.getElementById('thoiGian').value;
        if(!user || !user.hoTen) return alert("Vui lòng lưu thông tin khách trước!");
        if(!thoiGian) return alert("Vui lòng nhập khung giờ bạn muốn!");
        
        db.ref('lichDatCauLong').push({
            ten: user.hoTen, sdt: user.sdt,
            san: document.getElementById('san').value,
            ngay: document.getElementById('ngay').value,
            thoiGian: thoiGian
        }).then(() => alert("Đặt sân thành công!"));
    }

    function loadLich() {
        const san = document.getElementById('san').value;
        const ngay = document.getElementById('ngay').value;
        db.ref('lichDatCauLong').on('value', snap => {
            let html = '';
            snap.forEach(c => {
                let l = c.val();
                if(l.san == san && l.ngay == ngay) {
                    html += `<div class="list-item"><span><b>${l.thoiGian}</b> | ${l.ten}</span>
                             <button style="background:red; width:auto; padding:5px;" onclick="huy('${c.key}')">Hủy</button></div>`;
                }
            });
            document.getElementById('danhSach').innerHTML = html || "Chưa có lịch đặt";
        });
    }

    function huy(id) {
        if(prompt("Mật khẩu Admin:") == "PhucAn2026$") db.ref('lichDatCauLong/'+id).remove();
    }

    window.onload = () => {
        const user = JSON.parse(localStorage.getItem('user'));
        if(user) { document.getElementById('hoTen').value = user.hoTen; document.getElementById('sdt').value = user.sdt; }
    };
    document.getElementById('ngay').valueAsDate = new Date();
    loadLich();
</script>
</body>
</html>
