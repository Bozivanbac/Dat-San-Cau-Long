<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÚC AN BADMINTON</title>
    <style>
        :root { --primary: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 20px; font-size: 1.6em; }
        .hotline { background: #fff3cd; color: #856404; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; margin-bottom: 20px; border: 1px solid #ffeeba; }
        input, select { width: 100%; padding: 14px; margin-top: 5px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; background: #f9f9f9; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .time-box { background: #f0fdf4; border: 2px dashed var(--primary); padding: 15px; border-radius: 15px; text-align: center; margin-top: 10px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; }
    </style>
</head>
<body>

<div class="card">
    <h1>🏸 PHÚC AN BADMINTON 🏸</h1>
    <div class="hotline">☎ Hủy/Đổi sân: 0395.936.865</div>

    <div class="input-group">
        <label>THÔNG TIN KHÁCH</label>
        <input type="text" id="hoTen" placeholder="Họ và Tên">
        <input type="tel" id="sdt" placeholder="Số điện thoại">
        <button onclick="luuThongTin()" style="background:#34495e;">Lưu thông tin</button>
    </div>

    <div style="margin-top:20px;">
        <label>Chọn Sân & Ngày</label>
        <select id="san" onchange="loadLich()"><option>Sân số 1</option><option>Sân số 2</option></select>
        <input type="date" id="ngay" onchange="loadLich()">
    </div>

    <div class="time-box">
        <label>KHUNG GIỜ ĐẶT</label>
        <input type="text" id="thoiGian" placeholder="Ví dụ: 17:00 - 18:30" style="text-align:center; font-size:1.2em; font-weight:bold; color:var(--primary);">
    </div>
    
    <button onclick="datSan()" style="margin-top:20px;">XÁC NHẬN ĐẶT SÂN</button>

    <h3 style="margin-top:30px;">Lịch đã đặt:</h3>
    <div id="danhSach"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAs-wZ-Fm49pTHeZ15T8bZc9S9oFm6XvM4", databaseURL: "https://phuc-an-badminton-1ab18-default-rtdb.firebaseio.com", projectId: "phuc-an-badminton-1ab18" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function luuThongTin() {
        localStorage.setItem('user', JSON.stringify({hoTen: document.getElementById('hoTen').value, sdt: document.getElementById('sdt').value}));
        alert("Đã lưu thông tin!");
    }

    function datSan() {
        const user = JSON.parse(localStorage.getItem('user'));
        const thoiGian = document.getElementById('thoiGian').value;
        if(!user || !user.hoTen) return alert("Vui lòng lưu thông tin trước!");
        if(!thoiGian) return alert("Bạn chưa nhập giờ đặt!");
        db.ref('lichDatCauLong').push({
            ten: user.hoTen, sdt: user.sdt,
            san: document.getElementById('san').value,
            ngay: document.getElementById('ngay').value,
            thoiGian: thoiGian
        }).then(() => alert("Đặt thành công!"));
    }

    function loadLich() {
        const san = document.getElementById('san').value;
        const ngay = document.getElementById('ngay').value;
        db.ref('lichDatCauLong').on('value', snap => {
            let html = '';
            snap.forEach(c => {
                let l = c.val();
                if(l.san == san && l.ngay == ngay) {
                    html += `<div class="list-item"><span><b>${l.thoiGian}</b> | ${l.ten}</span>
                             <button style="background:#e74c3c; width:auto; padding:6px 10px; border-radius:8px;" onclick="huy('${c.key}')">Hủy</button></div>`;
                }
            });
            document.getElementById('danhSach').innerHTML = html || "<p style='text-align:center; color:#999;'>Sân còn trống</p>";
        });
    }

    function huy(id) {
        if(prompt("Mật khẩu Admin:") == "PhucAn2026$") db.ref('lichDatCauLong/'+id).remove();
    }

    window.onload = () => {
        const user = JSON.parse(localStorage.getItem('user'));
        if(user) { document.getElementById('hoTen').value = user.hoTen; document.getElementById('sdt').value = user.sdt; }
    };
    document.getElementById('ngay').valueAsDate = new Date();
    loadLich();
</script>
</body>
</html>
