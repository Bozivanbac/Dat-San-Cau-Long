<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG ĐẶT SÂN PHÚC AN</title>
    <style>
        :root { --mau-chinh: #2ecc71; --mau-do: #e74c3c; --mau-vang: #fff3cd; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; padding: 20px; color: #333; }
        .khung { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hotline { background: var(--mau-vang); padding: 12px; text-align: center; border-radius: 8px; margin-bottom: 20px; color: #856404; font-weight: bold; font-size: 16px; border: 1px solid #ffeeba; }
        .hotline a { color: var(--mau-do); text-decoration: none; }
        .o-gio { display: flex; justify-content: space-between; align-items: center; padding: 14px; border-bottom: 1px solid #eee; transition: 0.3s; }
        .da-dat { color: var(--mau-do); font-weight: bold; }
        .trong { color: #27ae60; }
        .nut-huy { background: var(--mau-do); color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .nut-dat { background: var(--mau-chinh); color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

<div class="khung">
    <div class="hotline">Cần hỗ trợ Hủy/Đổi sân? Gọi ngay: <a href="tel:0395936865">0395.936.865</a></div>
    
    <h2 style="text-align:center; color:#27ae60;">🏸 LỊCH SÂN PHÚC AN</h2>
    
    <label>Chọn Sân:</label>
    <select id="chonSan" onchange="hienThiLich()">
        <option>Sân số 1</option><option>Sân số 2</option>
    </select>
    
    <label style="margin-top:10px; display:block;">Chọn Ngày:</label>
    <input type="date" id="chonNgay" onchange="hienThiLich()">
    
    <div id="danhSachLich" style="margin-top:20px;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://phuc-an-badminton-1ab18-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Cấu hình khung giờ
    const khungGioFix = ["05:00-06:00", "06:00-07:00", "07:00-08:00", "08:00-09:00", "17:00-18:00", "18:00-19:00", "19:00-20:00", "20:00-21:00"];
    let dataFirebase = [];

    // Lấy dữ liệu
    db.ref('lichDatCauLong').on('value', (snapshot) => {
        dataFirebase = [];
        snapshot.forEach(child => {
            dataFirebase.push({ id: child.key, ...child.val() });
        });
        hienThiLich();
    });

    function hienThiLich() {
        const san = document.getElementById('chonSan').value;
        const ngay = document.getElementById('chonNgay').value;
        const div = document.getElementById('danhSachLich');
        div.innerHTML = '';

        khungGioFix.forEach(gio => {
            const daDat = dataFirebase.find(i => i.san === san && i.ngay === ngay && i.khungGio === gio);
            const row = document.createElement('div');
            row.className = 'o-gio';
            
            if(daDat) {
                row.innerHTML = `<span>${gio} - <span class="da-dat">${daDat.ten}</span></span>
                                 <button class="nut-huy" onclick="huySan('${daDat.id}')">Hủy</button>`;
            } else {
                row.innerHTML = `<span class="trong">${gio} - Trống</span>
                                 <button class="nut-dat" onclick="datSan('${gio}')">Đặt Sân</button>`;
            }
            div.appendChild(row);
        });
    }

    // Fix lỗi Hủy sân bằng ID
    window.huySan = function(id) {
        const mk = prompt("Nhập mật khẩu Admin để hủy lịch:");
        if(mk === "PhucAn2026$") {
            db.ref('lichDatCauLong/' + id).set(null).then(() => alert("Đã xóa lịch thành công!"));
        } else {
            alert("Mật khẩu không đúng!");
        }
    };

    // Hàm đặt sân
    window.datSan = function(gio) {
        const ten = prompt("Nhập tên người đặt:");
        if(ten) {
            db.ref('lichDatCauLong').push({
                ten: ten, 
                san: document.getElementById('chonSan').value,
                ngay: document.getElementById('chonNgay').value, 
                khungGio: gio
            }).then(() => alert("Đặt sân thành công!"));
        }
    };

    // Thiết lập ngày hiện tại
    document.getElementById('chonNgay').valueAsDate = new Date();
</script>
</body>
</html>
