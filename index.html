<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>PHÚC AN BADMINTON</title>
    <style>
        :root { --primary: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; }
        .auth-box { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>PHÚC AN BADMINTON</h1>
    
    <!-- Phần Đăng Ký/Đăng Nhập -->
    <div id="authArea" class="auth-box">
        <h3>Tài khoản khách hàng</h3>
        <input type="text" id="hoTen" placeholder="Họ và Tên">
        <input type="tel" id="sdt" placeholder="Số điện thoại">
        <button onclick="dangKy()">Đăng ký / Lưu thông tin</button>
    </div>

    <!-- Phần Đặt Sân -->
    <div id="bookingArea">
        <label>Chọn Sân</label>
        <select id="san" onchange="loadLich()"><option>Sân số 1</option><option>Sân số 2</option></select>
        <label>Ngày</label>
        <input type="date" id="ngay" onchange="loadLich()">
        <div style="display:flex; gap:10px;">
            <input type="time" id="gioBD">
            <input type="time" id="gioKT">
        </div>
        <button onclick="datSan()">ĐẶT SÂN</button>

        <h3>Lịch đã đặt:</h3>
        <div id="danhSach"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAs-wZ-Fm49pTHeZ15T8bZc9S9oFm6XvM4",
        databaseURL: "https://phuc-an-badminton-1ab18-default-rtdb.firebaseio.com",
        projectId: "phuc-an-badminton-1ab18"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function dangKy() {
        const hoTen = document.getElementById('hoTen').value;
        const sdt = document.getElementById('sdt').value;
        if(hoTen && sdt) {
            localStorage.setItem('user', JSON.stringify({hoTen, sdt}));
            alert("Đã lưu thông tin!");
        }
    }

    function datSan() {
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user) return alert("Vui lòng nhập tên và SĐT trước!");
        
        db.ref('lichDatCauLong').push({
            ten: user.hoTen, sdt: user.sdt,
            san: document.getElementById('san').value,
            ngay: document.getElementById('ngay').value,
            gioBD: document.getElementById('gioBD').value,
            gioKT: document.getElementById('gioKT').value
        }).then(() => alert("Đặt sân thành công!"));
    }

    function loadLich() {
        const san = document.getElementById('san').value;
        const ngay = document.getElementById('ngay').value;
        db.ref('lichDatCauLong').on('value', snap => {
            let html = '';
            snap.forEach(c => {
                let l = c.val();
                if(l.san == san && l.ngay == ngay) {
                    html += `<div class="list-item">
                        <b>${l.gioBD}-${l.gioKT}</b> | ${l.ten} (${l.sdt})
                        <button style="background:red" onclick="huy('${c.key}')">Hủy</button>
                    </div>`;
                }
            });
            document.getElementById('danhSach').innerHTML = html || "Chưa có lịch đặt.";
        });
    }

    function huy(id) {
        if(prompt("Nhập mật khẩu Admin:") == "PhucAn2026$") {
            db.ref('lichDatCauLong/'+id).remove();
        }
    }

    document.getElementById('ngay').valueAsDate = new Date();
    loadLich();
</script>
</body>
</html>
