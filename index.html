<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHÚC AN BADMINTON</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card-bg: #1e293b;
            --primary: #38bdf8; 
            --primary-hover: #0ea5e9;
            --accent: #f43f5e; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --highlight: #f59e0b; /* Màu vàng cam để làm nổi bật */
        }
        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        .card { 
            max-width: 480px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 30px 20px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
            border: 1px solid var(--border);
        }
        h1 { 
            color: var(--text-main); 
            text-align: center; 
            font-size: 1.6em; 
            margin-top: 0;
            margin-bottom: 20px; 
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .hotline-box { 
            background: rgba(56, 189, 248, 0.08); 
            color: var(--primary); 
            padding: 14px; 
            border-radius: 16px; 
            text-align: center; 
            font-weight: 600; 
            margin-bottom: 25px; 
            border: 1px solid rgba(56, 189, 248, 0.2); 
            font-size: 0.95em;
            line-height: 1.5;
        }
        .hotline-box a { 
            color: var(--primary); 
            text-decoration: none; 
            font-size: 1.15em; 
            font-weight: 700;
            display: inline-block;
            margin-top: 4px;
            transition: transform 0.2s;
        }
        .hotline-box a:active { transform: scale(0.98); }
        
        .box { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 25px; 
        }
        .box h3 {
            font-size: 1em;
            letter-spacing: 0.5px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9em;
        }
        input, select { 
            width: 100%; 
            padding: 14px; 
            margin: 6px 0 16px 0; 
            background: #111827;
            border: 1px solid var(--border); 
            border-radius: 12px; 
            box-sizing: border-box; 
            color: var(--text-main);
            font-size: 1em;
            transition: all 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        /* THIẾT KẾ RIÊNG CHO Ô CHỌN NGÀY TO, NỔI BẬT */
        input[type="date"] {
            padding: 18px 15px; /* Làm ô cao và to hơn hẳn */
            font-size: 1.2em;    /* Chữ ngày tháng to rõ ràng */
            font-weight: 700;
            color: var(--highlight); /* Màu chữ vàng cam nổi bật */
            border: 2px solid rgba(245, 158, 11, 0.4); /* Viền vàng cam */
            background: #0f172a;
            cursor: pointer;
        }
        input[type="date"]:focus {
            border-color: var(--highlight);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.2);
        }
        /* Tùy chỉnh icon lịch mặc định của trình duyệt cho sáng và rõ hơn */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(75%) sepia(80%) saturate(1000%) hue-rotate(340deg); /* Chuyển icon lịch sang màu vàng cam sáng */
            transform: scale(1.4); /* Phóng to icon lịch */
            cursor: pointer;
        }
        
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: #0f172a; 
            border: none; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 1em;
            cursor: pointer; 
            transition: all 0.2s;
        }
        button:active { transform: scale(0.98); }
        
        .time-section { margin: 20px 0; }
        .time-section label { color: var(--text-main); font-size: 0.95em; margin-bottom: 10px; }
        .time-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .chip { 
            padding: 10px 16px; 
            background: #111827; 
            border: 1px solid var(--border); 
            border-radius: 50px; 
            font-size: 0.9em; 
            cursor: pointer; 
            color: var(--text-main); 
            font-weight: 600; 
            transition: all 0.2s;
        }
        .chip:hover, .chip:active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(56, 189, 248, 0.05);
        }
        
        .section-title {
            font-size: 1.1em;
            font-weight: 700;
            margin-top: 30px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }
        .list-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 14px; 
            background: #111827;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        .list-item b { color: var(--primary); }
        
        .qr-section { 
            margin-top: 35px; 
            text-align: center; 
            padding: 20px 15px 0 15px; 
            border-top: 1px dashed var(--border); 
        }
        .qr-section div { font-size: 0.95em; font-weight: 600; margin-bottom: 15px; color: var(--text-muted); }
        .qr-section img { 
            width: 140px; 
            height: 140px; 
            border: 4px solid var(--border); 
            border-radius: 16px; 
            padding: 5px;
            background: white;
        }
    </style>
</head>
<body>

<div class="card">
    <h1><span>🏸</span> PHÚC AN BADMINTON</h1>
    
    <div class="hotline-box">
        Hủy/Đổi sân gọi ngay:<br>
        <a href="tel:0395936865">☎ 0395.936.865</a>
    </div>

    <div class="box">
        <h3 style="margin-top:0; color:var(--primary);">THÔNG TIN KHÁCH HÀNG</h3>
        <label>Họ và tên</label>
        <input type="text" id="hoTen" placeholder="Nhập họ và tên khách">
        <label>Số điện thoại</label>
        <input type="tel" id="sdt" placeholder="Nhập chính xác 10 chữ số">
        <button onclick="luuThongTin()" style="background: #334155; color: var(--text-main); margin-top: 5px;">Lưu thông tin</button>
    </div>

    <label>Chọn Sân</label>
    <select id="san" onchange="loadLich()"><option>Sân số 1</option><option>Sân số 2</option></select>
    
    <label style="color: var(--highlight); font-weight: 700;">📅 BẤM VÀO ĐÂY ĐỂ CHỌN NGÀY ĐẶT SÂN:</label>
    <input type="date" id="ngay" onchange="loadLich()">
    
    <div class="time-section">
        <label>☀️ Ca Sáng (Mỗi ca 2 tiếng):</label>
        <div class="time-chips">
            <span class="chip" onclick="chonGio('05h-07h')">05h - 07h</span>
            <span class="chip" onclick="chonGio('07h-09h')">07h - 09h</span>
            <span class="chip" onclick="chonGio('09h-11h')">09h - 11h</span>
        </div>
    </div>

    <div class="time-section">
        <label>🌙 Ca Tối (Mỗi ca 2 tiếng):</label>
        <div class="time-chips">
            <span class="chip" onclick="chonGio('17h-19h')">17h - 19h</span>
            <span class="chip" onclick="chonGio('19h-21h')">19h - 21h</span>
            <span class="chip" onclick="chonGio('21h-23h')">21h - 23h</span>
        </div>
    </div>
    
    <label>Hoặc nhập giờ tự chọn</label>
    <input type="text" id="thoiGian" placeholder="Ví dụ: 17h30-19h31">
    <button onclick="datSan()" style="margin-top:5px; background: linear-gradient(135deg, var(--primary), #0ea5e9);">XÁC NHẬN ĐẶT SÂN</button>

    <div class="section-title">Lịch đã đặt</div>
    <div id="danhSach"></div>

    <div class="qr-section">
        <div>Quét mã tham gia nhóm Zalo</div>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://zalo.me/g/xfpsrdyei8f0nnhza8tu" alt="QR Zalo">
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAs-wZ-Fm49pTHeZ15T8bZc9S9oFm6XvM4", databaseURL: "https://phuc-an-badminton-1ab18-default-rtdb.firebaseio.com", projectId: "phuc-an-badminton-1ab18" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function chonGio(g) { document.getElementById('thoiGian').value = g; }
    
    function luuThongTin() {
        const hoTen = document.getElementById('hoTen').value.trim();
        const sdt = document.getElementById('sdt').value.trim();

        if (!hoTen) {
            return alert("❌ Bạn chưa nhập Họ và tên khách!");
        }
        if (!sdt) {
            return alert("❌ Bạn chưa nhập Số điện thoại!");
        }
        if (!/^\d{10}$/.test(sdt)) {
            return alert("❌ Số điện thoại không hợp lệ! Vui lòng nhập chính xác 10 chữ số.");
        }

        localStorage.setItem('user', JSON.stringify({hoTen: hoTen, sdt: sdt}));
        alert("Thông tin của bạn đã được lưu thành công!");
    }

    function toMinutes(timeStr) {
        let cleanTime = timeStr.toLowerCase().replace('h', ':').replace('g', ':');
        let [h, m] = cleanTime.split(':').map(Number);
        return (h * 60) + (m || 0);
    }

    function datSan() {
        const user = JSON.parse(localStorage.getItem('user'));
        const thoiGian = document.getElementById('thoiGian').value;
        const san = document.getElementById('san').value;
        const ngay = document.getElementById('ngay').value;

        if(!user || !user.hoTen || !user.sdt) return alert("❌ Vui lòng điền và bấm 'Lưu thông tin' ở trên trước khi đặt sân!");
        if(!thoiGian || !thoiGian.includes('-')) return alert("Vui lòng nhập giờ dạng: 17h30-19h30");

        const [startStr, endStr] = thoiGian.split('-');
        const newStart = toMinutes(startStr);
        const newEnd = toMinutes(endStr);

        db.ref('lichDatCauLong').once('value', (snap) => {
            let isOverlapping = false;
            snap.forEach(c => {
                let l = c.val();
                if(l.san == san && l.ngay == ngay) {
                    const [s, e] = l.thoiGian.split('-');
                    if (newStart < toMinutes(e) && newEnd > toMinutes(s)) isOverlapping = true;
                }
            });

            if(isOverlapping) {
                alert("❌ Khung giờ này bị trùng lịch! Vui lòng chọn giờ khác.");
            } else {
                db.ref('lichDatCauLong').push({
                    ten: user.hoTen, sdt: user.sdt,
                    san: san, ngay: ngay, thoiGian: thoiGian
                }).then(() => alert("✅ Đặt thành công!"));
            }
        });
    }

    function loadLich() {
        const san = document.getElementById('san').value;
        const ngay = document.getElementById('ngay').value;
        const isAdmin = localStorage.getItem('isAdmin') === 'true';

        db.ref('lichDatCauLong').on('value', snap => {
            let html = '';
            snap.forEach(c => {
                let l = c.val();
                if(l.san == san && l.ngay == ngay) {
                    let info = isAdmin ? `| 📞 ${l.sdt}` : "";
                    html += `<div class="list-item"><span><b>${l.thoiGian}</b> | ${l.ten} ${info}</span>
                             <button style="background:var(--accent); color: white; width:auto; padding:6px 14px; border-radius:8px;" onclick="huy('${c.key}')">Hủy</button></div>`;
                }
            });
            document.getElementById('danhSach').innerHTML = html || "<p style='text-align:center; color:var(--text-muted); padding: 10px 0;'>Sân trống</p>";
        });
    }

    function huy(id) {
        if(prompt("Mật khẩu Admin:") == "PhucAn2026$") {
            localStorage.setItem('isAdmin', 'true');
            db.ref('lichDatCauLong/'+id).remove();
        } else { alert("Sai mật khẩu!"); }
    }

    window.onload = () => {
        const user = JSON.parse(localStorage.getItem('user'));
        if(user) { document.getElementById('hoTen').value = user.hoTen; document.getElementById('sdt').value = user.sdt; }
        document.getElementById('ngay').valueAsDate = new Date();
        loadLich();
    };
</script>
</body>
</html>
