<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HỆ THỐNG ĐẶT SÂN PHÚC AN BADMINTON</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f6fa; }
        .khung { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .o-gio { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #ddd; }
        .btn-huy { background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .hotline { background: #fff3cd; padding: 10px; text-align: center; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="khung">
    <div class="hotline">Hỗ trợ hủy sân: <b>0395.936.865</b></div>
    <h2>LỊCH SÂN</h2>
    <select id="chonSan" onchange="hienThiLich()"><option>Sân số 1</option><option>Sân số 2</option></select>
    <input type="date" id="chonNgay" onchange="hienThiLich()">
    <div id="danhSach"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    // Cấu hình chuẩn của bạn
    const firebaseConfig = {
        apiKey: "AIzaSyAs-wZ-Fm49pTHeZ15T8bZc9S9oFm6XvM4",
        authDomain: "phuc-an-badminton-1ab18.firebaseapp.com",
        databaseURL: "https://phuc-an-badminton-1ab18-default-rtdb.firebaseio.com",
        projectId: "phuc-an-badminton-1ab18",
        storageBucket: "phuc-an-badminton-1ab18.appspot.com",
        messagingSenderId: "569618037341",
        appId: "1:569618037341:web:d236ef0d8efda08b9f1d07"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dsLich = [];
    document.getElementById('chonNgay').valueAsDate = new Date();

    db.ref('lichDatCauLong').on('value', snap => {
        dsLich = [];
        snap.forEach(c => dsLich.push({ id: c.key, ...c.val() }));
        hienThiLich();
    });

    function hienThiLich() {
        const san = document.getElementById('chonSan').value;
        const ngay = document.getElementById('chonNgay').value;
        const div = document.getElementById('danhSach');
        div.innerHTML = '';
        dsLich.filter(l => l.san === san && l.ngay === ngay).forEach(l => {
            div.innerHTML += `<div class="o-gio">${l.gioBatDau}-${l.gioKetThuc} - ${l.ten} 
            <button class="btn-huy" onclick="huySan('${l.id}')">Hủy</button></div>`;
        });
    }

    function huySan(id) {
        if(prompt("Nhập mật khẩu Admin:") === "PhucAn2026$") {
            db.ref('lichDatCauLong/' + id).set(null).then(() => alert("Đã hủy!"));
        } else {
            alert("Sai mật khẩu!");
        }
    }
</script>
</body>
</html>
